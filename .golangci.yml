version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ravinald/jsondiff

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

linters-settings:
  gocritic:
    disabled-checks:
      - ifElseChain

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
